<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Picea Lab Web</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="rail" aria-label="Artifact controls">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <h1>Picea Lab</h1>
            <p id="run-id">loading</p>
          </div>
        </div>

        <section class="panel">
          <h2>Artifacts</h2>
          <label class="file-pick">
            <input id="artifact-files" type="file" multiple accept=".json,.jsonl" />
            Choose files
          </label>
          <p class="hint">final_snapshot, debug_render, trace, perf</p>
        </section>

        <section class="panel">
          <h2>Filters</h2>
          <label>
            Element
            <input id="element-filter" inputmode="numeric" placeholder="1" />
          </label>
          <label>
            Pair
            <input id="pair-filter" placeholder="1,2" />
          </label>
          <label>
            Phase
            <select id="phase-filter">
              <option value="">Any phase</option>
            </select>
          </label>
          <button id="clear-filters" type="button">Clear</button>
        </section>

        <section class="panel metrics" aria-label="Run metrics">
          <div><span>Elements</span><strong id="metric-elements">0</strong></div>
          <div><span>Contacts</span><strong id="metric-contacts">0</strong></div>
          <div><span>Events</span><strong id="metric-events">0</strong></div>
          <div><span>Hash</span><strong id="metric-hash">-</strong></div>
        </section>
      </aside>

      <section class="stage" aria-label="Artifact viewer">
        <div class="viewport-wrap">
          <canvas id="viewport" width="960" height="540" aria-label="Debug render viewport"></canvas>
        </div>

        <div class="lower">
          <section class="panel">
            <div class="section-head">
              <h2>Contacts</h2>
              <span id="contact-count">0</span>
            </div>
            <div id="contacts" class="list"></div>
          </section>

          <section class="panel">
            <div class="section-head">
              <h2>Manifolds</h2>
              <span id="manifold-count">0</span>
            </div>
            <div id="manifolds" class="list"></div>
          </section>

          <section class="panel timeline-panel">
            <div class="section-head">
              <h2>Timeline</h2>
              <span id="timeline-count">0</span>
            </div>
            <div id="timeline" class="timeline"></div>
          </section>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
